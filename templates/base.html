<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Lobbyzinha{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --bg2: #111111;
      --bg3: #1a1a1a;
      --accent: #e0e0e0;
      --accent2: #bdbdbd;
      --text: #f0f0f0;
      --muted: #888;
      --border: #222;
      --radius: 10px;
      --glow: 0 0 20px rgba(0,255,135,0.15);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      line-height: 1.6;
    }

    a { color: inherit; text-decoration: none; }

    /* NAVBAR */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 6%;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: rgba(10,10,10,0.92);
      backdrop-filter: blur(10px);
      z-index: 100;
    }

    .nav-logo {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 1px;
    }

    .nav-logo span { color: var(--text); }

    .nav-links { display: flex; gap: 2rem; color: var(--muted); font-size: 0.95rem; }
    .nav-links a:hover { color: var(--text); }

    .nav-actions { display: flex; gap: 0.75rem; align-items: center; }

    .btn {
      padding: 0.5rem 1.2rem;
      border-radius: var(--radius);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }

    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { color: var(--text); border-color: #444; }

    .btn-primary {
      background: var(--accent);
      color: #111;
    }

    .btn-outline {
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--accent);
    }
    .btn-outline:hover { background: rgba(0,255,135,0.08); }

    .btn-lg { padding: 0.75rem 1.8rem; font-size: 1rem; border-radius: 12px; }

    {% block extra_style %}{% endblock %}
  </style>
</head>
<body>

<nav>
  <div class="nav-logo">Lobby<span>zinha</span></div>
  <div class="nav-links">
    <a href="#">Home</a>
    <a href="#">Teams</a>
    <a href="#">Players</a>
    <a href="#">About</a>
  </div>
  <div class="nav-actions">
    <a href="{% url 'login' %}" class="btn btn-ghost">Login</a>
    <a href="{% url 'register' %}" class="btn btn-primary">Get Started</a>
  </div>
</nav>

{% block content %}{% endblock %}

<footer style="border-top:1px solid var(--border); padding:2rem 6%; display:flex; justify-content:space-between; align-items:center; color:var(--muted); font-size:0.85rem;">
  <span style="color:var(--accent); font-weight:700;">Lobbyzinha</span>
  <div style="display:flex; gap:1.5rem;">
    <a href="#" style="color:var(--muted);">About</a>
    <a href="#" style="color:var(--muted);">Contact</a>
    <a href="https://github.com/JPPaiva17/INF1047_G1" target="_blank" style="color:var(--muted);">GitHub</a>
  </div>
</footer>

</body>
</html>
